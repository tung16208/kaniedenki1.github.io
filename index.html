<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>作業依頼システム｜カニエ電機株式会社</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#0d2b4e;--navy2:#1a3f6b;--blue:#2563a8;
  --orange:#e85d2f;--orange2:#ff7a52;
  --bg:#eef2f7;--sur:#fff;--sur2:#f5f8fc;
  --bdr:#d5dfe8;--txt:#0d2b4e;--txb:#2d3e52;--txs:#607080;
  --rad:12px;--radl:18px;--rads:8px;
  --shd:0 4px 20px rgba(13,43,78,.12);--shds:0 2px 8px rgba(13,43,78,.08);
  --ok:#0f7c4a;--warn:#b45309;--err:#c82020;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;color:var(--txb);-webkit-font-smoothing:antialiased;}

/* AUTH */
#authScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(160deg,var(--navy) 0%,var(--navy2) 55%,#1e4d8a 100%);position:relative;overflow:hidden;}
#authScreen::before{content:'';position:absolute;top:-100px;right:-100px;width:350px;height:350px;border-radius:50%;background:rgba(255,255,255,0.03);}
#authScreen::after{content:'';position:absolute;bottom:-80px;left:-80px;width:280px;height:280px;border-radius:50%;background:rgba(232,93,47,0.07);}
.auth-box{width:min(420px,96vw);background:var(--sur);border-radius:var(--radl);box-shadow:0 8px 40px rgba(13,43,78,.25);overflow:hidden;position:relative;z-index:1;}
.auth-logo-bar{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:28px 28px 22px;text-align:center;border-bottom:3px solid var(--orange);}
.auth-logo-bar .sub{color:rgba(255,255,255,.5);font-size:11px;margin-top:6px;letter-spacing:2px;}
.auth-body{padding:26px 26px 22px;}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;background:var(--sur2);border:1.5px solid var(--bdr);border-radius:var(--rad);padding:4px;gap:4px;margin-bottom:20px;}
.auth-tab{padding:11px 8px;border:none;background:transparent;font-size:13px;font-weight:600;font-family:inherit;color:var(--txs);cursor:pointer;border-radius:var(--rads);transition:.2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.auth-tab.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(13,43,78,.25);}
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px;letter-spacing:.3px;}
.fld input{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:14px;font-family:inherit;background:var(--sur2);color:var(--txt);outline:none;transition:.2s;}
.fld input:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,168,.1);}
.auth-err{background:#fff5f5;border:1.5px solid #fca5a5;color:var(--err);padding:10px 14px;border-radius:var(--rads);font-size:12px;margin-bottom:12px;display:none;}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:var(--rads);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.5px;transition:.2s;box-shadow:0 4px 14px rgba(232,93,47,.35);}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(232,93,47,.4);}
.auth-hint{text-align:center;margin-top:12px;font-size:11px;color:var(--txs);}

/* APP */
#appShell{display:none;min-height:100vh;flex-direction:column;}
.topbar{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;flex-shrink:0;border-bottom:3px solid var(--orange);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(13,43,78,.3);}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-name{color:#fff;font-size:14px;font-weight:700;letter-spacing:.3px;}
.tb-sub{color:rgba(255,255,255,.5);font-size:9px;letter-spacing:2px;text-transform:uppercase;}
.tb-right{display:flex;align-items:center;gap:8px;}
.user-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);padding:5px 11px;border-radius:99px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:5px;max-width:150px;}
.u-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.btn-out{background:transparent;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);padding:6px 12px;border-radius:var(--rads);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s;}
.btn-out:hover{border-color:rgba(255,255,255,.6);color:#fff;}
.content{flex:1;padding:16px 16px 88px;max-width:660px;margin:0 auto;width:100%;}
.page{display:none;}
.page.active{display:block;}
.ph{margin-bottom:18px;}
.ph h2{font-size:20px;font-weight:700;color:var(--navy);}
.ph p{font-size:12px;color:var(--txs);margin-top:2px;}
.ph-line{height:3px;width:36px;background:var(--orange);border-radius:2px;margin-top:7px;}

/* CARD */
.card{background:var(--sur);border-radius:var(--radl);box-shadow:var(--shds);border:1px solid var(--bdr);padding:20px;margin-bottom:16px;}

/* COMPANY BADGE */
.co-badge{background:linear-gradient(90deg,#eef4fb,#f5f8fc);border:1.5px solid #c5d6e8;border-radius:var(--rad);padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;}
.co-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.co-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue);margin-bottom:2px;}
.co-name{font-size:16px;font-weight:700;color:var(--navy);}

/* FORM LABELS */
.flbl{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;}
.req{font-size:10px;background:var(--orange);color:#fff;padding:2px 8px;border-radius:99px;font-weight:700;}
.opt{font-size:10px;background:#e0eaf5;color:var(--blue);padding:2px 8px;border-radius:99px;font-weight:500;}

/* RADIO PILLS */
.rpills{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.rp input[type="radio"]{display:none;}
.rp label{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:11px 6px;border:1.5px solid var(--bdr);border-radius:var(--rad);cursor:pointer;font-size:12px;font-weight:600;color:var(--txs);background:var(--sur2);transition:.18s;user-select:none;text-align:center;}
.rp label .ri{font-size:20px;}
.rp input:checked+label{border-color:var(--navy);background:#eef4fb;color:var(--navy);box-shadow:0 0 0 3px rgba(13,43,78,.1);}
.rp label:hover{border-color:var(--blue);}

/* DEVICES */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.di input[type="checkbox"]{display:none;}
.di label{display:flex;align-items:center;gap:9px;padding:12px 13px;border:1.5px solid var(--bdr);border-radius:var(--rad);cursor:pointer;font-size:13px;font-weight:500;color:var(--txs);background:var(--sur2);transition:.18s;user-select:none;}
.di input:checked+label{border-color:var(--navy);background:#eef4fb;color:var(--navy);font-weight:700;}
.di label:hover{border-color:var(--blue);}
.di-ico{font-size:19px;flex-shrink:0;}
.chk{width:18px;height:18px;border:1.5px solid var(--bdr);border-radius:5px;margin-left:auto;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:.15s;flex-shrink:0;}
.di input:checked+label .chk{background:var(--navy);border-color:var(--navy);color:#fff;}
.mnum{max-height:0;overflow:hidden;transition:max-height .3s,opacity .3s,margin .3s;opacity:0;}
.mnum.show{max-height:60px;opacity:1;margin-top:8px;}
.mnum-in{display:flex;align-items:center;gap:8px;background:#eef4fb;border:1.5px solid var(--blue);border-radius:8px;padding:8px 12px;}
.mnum-in label{font-size:11px;font-weight:700;color:var(--navy);white-space:nowrap;}
.mnum-in input{flex:1;border:1.5px solid var(--bdr);border-radius:6px;padding:6px 10px;font-size:13px;font-family:inherit;background:#fff;outline:none;}
.mnum-in input:focus{border-color:var(--blue);}
textarea{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:14px;font-family:inherit;background:var(--sur2);resize:vertical;min-height:88px;outline:none;transition:.2s;color:var(--txt);}
textarea:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,168,.1);}
.tinput{width:100%;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:14px;font-family:inherit;background:var(--sur2);outline:none;transition:.2s;color:var(--txt);}
.tinput:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(37,99,168,.1);}
.frow{margin-bottom:20px;}
.btn-send{width:100%;padding:15px;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:var(--rad);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(232,93,47,.35);transition:.2s;letter-spacing:.5px;}
.btn-send:hover{transform:translateY(-1px);}
.btn-send:disabled{opacity:.55;cursor:not-allowed;transform:none;}

/* HISTORY */
.hlist{display:flex;flex-direction:column;gap:10px;}
.hcard{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 16px;border-left:4px solid var(--bdr);}
.hcard.s-miteii{border-left-color:#f59e0b;}
.hcard.s-jissyu{border-left-color:#3b82f6;}
.hcard.s-kanryo{border-left-color:#10b981;}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;}
.hc-t{font-size:13px;font-weight:700;color:var(--navy);}
.hc-d{font-size:11px;color:var(--txs);white-space:nowrap;}
.hc-r{font-size:12px;color:var(--txs);margin-top:3px;}
.hc-s{display:inline-flex;align-items:center;gap:5px;background:#eef4fb;border:1px solid #c5d6e8;color:var(--blue);padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;margin-top:8px;}

/* BADGES */
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.bdg::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7;}
.b-m{background:#fef3c7;color:#92400e;}
.b-j{background:#dbeafe;color:#1e40af;}
.b-k{background:#d1fae5;color:#065f46;}

/* STAFF */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.sc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rad);padding:14px 12px;text-align:center;}
.sn{font-size:28px;font-weight:700;color:var(--navy);}
.sl{font-size:11px;color:var(--txs);margin-top:2px;}
.sc.sw .sn{color:#d97706;}
.sc.sg .sn{color:#059669;}
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.fbar select{flex:1;min-width:110px;border:1.5px solid var(--bdr);border-radius:var(--rads);padding:9px 11px;font-size:12px;font-family:inherit;background:var(--sur);color:var(--txt);outline:none;cursor:pointer;}
.btn-xl{background:var(--navy);color:#fff;border:none;border-radius:var(--rads);padding:9px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.2s;}
.btn-xl:hover{background:var(--blue);}
.rlist{display:flex;flex-direction:column;gap:10px;}
.rc{background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rad);overflow:hidden;border-top:3px solid var(--bdr);}
.rc.s-miteii{border-top-color:#f59e0b;}
.rc.s-jissyu{border-top-color:#3b82f6;}
.rc.s-kanryo{border-top-color:#10b981;}
.rc-body{padding:14px 16px;}
.rc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rc-co{font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;background:var(--navy);color:#fff;padding:3px 10px;border-radius:99px;}
.rc-date{font-size:11px;color:var(--txs);}
.rc-shiji{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.rc-kiki{font-size:12px;color:var(--txs);margin-bottom:8px;}
.rc-biko{font-size:12px;color:var(--txb);background:var(--sur2);border-radius:6px;padding:8px 10px;margin-bottom:10px;border-left:3px solid var(--orange);}
.rc-ft{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--bdr);}
.rc-tanto{font-size:12px;color:var(--txs);display:flex;align-items:center;gap:4px;}
.rc-staff{display:flex;align-items:center;gap:5px;background:#eef4fb;color:var(--blue);border:1px solid #c5d6e8;border-radius:99px;padding:3px 10px;font-size:11px;font-weight:700;}
.ssel{border:1.5px solid var(--bdr);border-radius:var(--rads);padding:6px 10px;font-size:12px;font-family:inherit;background:var(--sur);outline:none;cursor:pointer;margin-left:auto;}
.ssel.sm{background:#fef3c7;color:#92400e;border-color:#fcd34d;}
.ssel.sj{background:#dbeafe;color:#1e40af;border-color:#93c5fd;}
.ssel.sk{background:#d1fae5;color:#065f46;border-color:#6ee7b7;}
.btn-acc{background:var(--orange);color:#fff;border:none;border-radius:var(--rads);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:.2s;white-space:nowrap;}
.btn-acc:hover{background:var(--orange2);}
.btn-acc:disabled{background:#9ca3af;cursor:not-allowed;}
.btn-acc.done{background:#e0eaf5;color:var(--blue);}
.btn-taihi{background:#f0fdf4;color:#065f46;border:1.5px solid #6ee7b7;border-radius:var(--rads);padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;transition:.2s;white-space:nowrap;}
.btn-taihi:hover{background:#dcfce7;border-color:#34d399;}
.btn-taihi:disabled{opacity:.4;cursor:not-allowed;}

/* COMMENT SECTION */
.cmt-area{margin-top:10px;border-top:1px solid var(--bdr);padding-top:10px;}
.cmt-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px;}
.cmt-item{background:var(--sur2);border-radius:var(--rads);padding:8px 12px;border-left:3px solid var(--blue);}
.cmt-meta{font-size:10px;color:var(--txs);margin-bottom:3px;display:flex;gap:8px;}
.cmt-text{font-size:12px;color:var(--txb);}
.cmt-form{display:flex;gap:6px;align-items:flex-end;}
.cmt-form textarea{flex:1;min-height:52px;font-size:12px;padding:8px 10px;resize:none;}
.btn-cmt{background:var(--navy);color:#fff;border:none;border-radius:var(--rads);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.2s;align-self:flex-end;}
.btn-cmt:hover{background:var(--blue);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(13,43,78,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px);}
.modal-box{background:var(--sur);border-radius:var(--radl);box-shadow:0 8px 40px rgba(13,43,78,.3);width:min(380px,96vw);overflow:hidden;}
.modal-hd{background:linear-gradient(135deg,var(--navy),var(--navy2));padding:18px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-hd h3{color:#fff;font-size:15px;font-weight:700;}
.modal-close{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}
.modal-body .fld{margin-bottom:14px;}
.modal-body label{display:block;font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.modal-body select,.modal-body input{width:100%;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:14px;font-family:inherit;background:var(--sur2);outline:none;}
.modal-body select:focus,.modal-body input:focus{border-color:var(--blue);}
.modal-ft{display:flex;gap:8px;padding:0 20px 20px;}
.btn-modal-ok{flex:1;padding:12px;background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:var(--rads);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;}
.btn-modal-ok:hover{opacity:.9;}
.btn-modal-cancel{flex:1;padding:12px;background:var(--sur2);color:var(--txb);border:1.5px solid var(--bdr);border-radius:var(--rads);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;}
.btn-modal-cancel:hover{border-color:var(--blue);color:var(--navy);}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--sur);border-top:1.5px solid var(--bdr);display:flex;box-shadow:0 -4px 20px rgba(13,43,78,.1);padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 4px 7px;border:none;background:none;cursor:pointer;font-size:10px;font-family:inherit;color:var(--txs);font-weight:500;transition:.2s;gap:3px;position:relative;}
.nb.active{color:var(--navy);}
.nb-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;transition:.2s;}
.nb.active .nb-ico{background:var(--navy);color:#fff;}
.nbadge{position:absolute;top:5px;right:calc(50% - 22px);min-width:16px;height:16px;border-radius:99px;background:var(--orange);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--sur);}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;}
.empty .ei{font-size:44px;margin-bottom:10px;opacity:.35;}
.empty p{color:var(--txs);font-size:13px;}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--navy);color:#fff;padding:11px 22px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(13,43,78,.3);pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
#toast.error{background:var(--err);}
#toast.warn{background:var(--warn);}
#toast.ok{background:var(--ok);}

@media(max-width:480px){.dgrid{grid-template-columns:1fr;}.sgrid{grid-template-columns:repeat(3,1fr);}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo-bar">
      <svg width="190" height="58" viewBox="0 0 190 58" xmlns="http://www.w3.org/2000/svg">
        <circle cx="28" cy="28" r="25" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <text x="28" y="36" font-size="27" text-anchor="middle" fill="white" font-family="'游明朝','Hiragino Mincho ProN',serif" font-weight="700">蟹</text>
        <rect x="62" y="8" width="2.5" height="42" fill="rgba(255,255,255,0.2)" rx="1.5"/>
        <text x="72" y="24" font-size="15" fill="#ffffff" font-family="'Noto Sans JP',sans-serif" font-weight="700" letter-spacing="1">カニエ電機</text>
        <text x="72" y="38" font-size="9" fill="rgba(255,255,255,0.6)" font-family="Arial,Helvetica,sans-serif" font-weight="400" letter-spacing="2.5">KANIE ELECTRIC</text>
        <text x="72" y="50" font-size="8" fill="rgba(255,255,255,0.4)" font-family="Arial,Helvetica,sans-serif" letter-spacing="1">CO., LTD.</text>
      </svg>
      <div class="sub">作業依頼システム / WORK ORDER SYSTEM</div>
    </div>
    <div class="auth-body">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('client',this)">🏢 取引先</button>
        <button class="auth-tab" onclick="switchTab('staff',this)">👷 スタッフ</button>
      </div>

<script>
const EJ_KEY="_efCoOTySMW7-n5dK",EJ_SVC="service_qo6afaf",EJ_TPL="template_3wrvxdq",NOTIFY="damthanhtung1911@gmail.com";
emailjs.init(EJ_KEY);

const USERS={
  "kaisha-a":{pass:"passA123",type:"client",name:"会社A（株式会社A）",short:"会社A"},
  "kaisha-b":{pass:"passB123",type:"client",name:"会社B（株式会社B）",short:"会社B"},
  "kaisha-c":{pass:"passC123",type:"client",name:"会社C（株式会社C）",short:"会社C"},
  "staff-01":{pass:"staff001",type:"staff",name:"山田 太郎（スタッフ）",short:"山田 太郎"},
  "staff-02":{pass:"staff002",type:"staff",name:"鈴木 花子（スタッフ）",short:"鈴木 花子"},
};

let cu=null,reqs=loadR();
function loadR(){try{return JSON.parse(localStorage.getItem('ke_irai')||'[]');}catch(e){return[];}}
function saveR(){localStorage.setItem('ke_irai',JSON.stringify(reqs));}

let ltype="client";
function switchTab(t,btn){ltype=t;document.querySelectorAll('.auth-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}

function doLogin(){
  const id=document.getElementById('lid').value.trim(),pw=document.getElementById('lpw').value;
  const err=document.getElementById('authErr');err.style.display='none';
  const u=USERS[id];
  if(!u||u.pass!==pw||u.type!==ltype){err.textContent='⚠️ IDまたはパスワードが正しくありません';err.style.display='block';return;}
  cu={id,...u};
  document.getElementById('authScreen').style.display='none';
  const sh=document.getElementById('appShell');sh.style.display='flex';sh.style.flexDirection='column';
  document.getElementById('upname').textContent=u.short;
  buildNav();
  if(u.type==='client'){document.getElementById('facilityName').textContent=u.name;showPage('pageForm');}
  else{buildFilter();showPage('pageStaff');renderStaff();}
}

function doLogout(){cu=null;document.getElementById('appShell').style.display='none';document.getElementById('authScreen').style.display='flex';document.getElementById('lid').value='';document.getElementById('lpw').value='';}

function buildNav(){
  const nav=document.getElementById('bnav');
  const pend=reqs.filter(r=>r.status==='未定').length;
  if(cu.type==='client'){
    nav.innerHTML=`<button class="nb active" id="bn1" onclick="sp('pageForm','bn1')"><div class="nb-ico">📋</div>依頼フォーム</button><button class="nb" id="bn2" onclick="sp('pageHistory','bn2');renderHistory()"><div class="nb-ico">📂</div>依頼履歴</button>`;
  }else{
    nav.innerHTML=`<button class="nb active" id="bn3" onclick="sp('pageStaff','bn3');renderStaff()"><div class="nb-ico">📊</div>依頼管理${pend>0?`<span class="nbadge">${pend}</span>`:''}</button>`;
  }
}

function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function sp(id,bid){showPage(id);document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));document.getElementById(bid)?.classList.add('active');}

function tn(cb,id){document.getElementById(id).classList.toggle('show',cb.checked);}

function getMI(){
  const devs=[{i:'d1',l:'エアコン',n:'no1'},{i:'d2',l:'洗濯機',n:'no2'},{i:'d3',l:'乾燥機',n:'no3'},{i:'d4',l:'冷蔵庫',n:'no4'},{i:'d5',l:'その他',n:'no5'}];
  return devs.filter(d=>document.getElementById(d.i)?.checked).map(d=>{const v=document.getElementById(d.n)?.value;return v?`${d.l}（${v}）`:d.l;}).join('、')||'（未選択）';
}

async function sendForm(){
  const shiji=document.querySelector('input[name="shiji"]:checked');
  const tanto=document.getElementById('ftanto').value.trim();
  const devs=document.querySelectorAll('.di input[type="checkbox"]:checked');
  if(!shiji){showToast('指示内容を選択してください','error');return;}
  if(!devs.length){showToast('機器を1つ以上選択してください','error');return;}
  if(!tanto){showToast('担当者名を入力してください','error');return;}
  const now=new Date(),ds=`${now.getFullYear()}/${p2(now.getMonth()+1)}/${p2(now.getDate())} ${p2(now.getHours())}:${p2(now.getMinutes())}`;
  const kiki=getMI(),biko=document.getElementById('fbiko').value.trim();
  const rec={id:Date.now(),kaisha:cu.short,kaishaFull:cu.name,shiji:shiji.value,kiki,biko,tanto,date:ds,status:'未定',acceptedBy:''};
  const btn=document.getElementById('sendBtn');btn.disabled=true;btn.innerHTML='<span>⏳</span> 送信中…';
  try{
    await emailjs.send(EJ_SVC,EJ_TPL,{shisetsumei:cu.name,shiji:shiji.value,kiki,biko:biko||'（なし）',tanto,date:ds,to_email:NOTIFY,from_email:"tung16208@gmail.com"});
    reqs.push(rec);saveR();showToast('依頼を送信しました！','ok');resetForm();buildNav();
  }catch(e){
    console.error(e);reqs.push(rec);saveR();showToast('データを保存しました（メール送信エラー）','warn');resetForm();buildNav();
  }finally{btn.disabled=false;btn.innerHTML='<span>📨</span> 依頼を送信する';}
}

function resetForm(){
  document.querySelectorAll('input[name="shiji"]').forEach(r=>r.checked=false);
  document.querySelectorAll('.di input[type="checkbox"]').forEach(c=>{c.checked=false;c.dispatchEvent(new Event('change'));});
  document.querySelectorAll('.mnum-in input').forEach(i=>i.value='');
  document.getElementById('fbiko').value='';document.getElementById('ftanto').value='';
}

function renderHistory(){
  const el=document.getElementById('histContent');
  const mine=reqs.filter(r=>r.kaisha===cu.short).slice().reverse();
  if(!mine.length){el.innerHTML=`<div class="empty"><div class="ei">📂</div><p>依頼履歴がありません</p></div>`;return;}
  el.innerHTML=`<div class="hlist">${mine.map(r=>`<div class="hcard s-${sc(r.status)}"><div class="hc-top"><div><div class="hc-t">${r.shiji} ／ ${r.kiki}</div><div class="hc-r">👤 ${r.tanto}</div>${r.acceptedBy?`<div class="hc-s">🛠 担当: ${r.acceptedBy}</div>`:''}</div><div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px"><span class="hc-d">${r.date}</span>${bdg(r.status)}</div></div>${r.biko?`<div style="font-size:12px;color:var(--txs);border-top:1px solid var(--bdr);padding-top:8px;margin-top:4px">📝 ${r.biko}</div>`:''}</div>`).join('')}</div>`;
}

function buildFilter(){
  const sel=document.getElementById('fk');
  const cos=[...new Set(reqs.map(r=>r.kaisha))];
  sel.innerHTML='<option value="">すべての会社</option>'+cos.map(c=>`<option value="${c}">${c}</option>`).join('');
}

function renderStaff(){
  const fk=document.getElementById('fk').value,fs=document.getElementById('fs').value;
  let data=reqs.slice().reverse();
  if(fk)data=data.filter(r=>r.kaisha===fk);
  if(fs)data=data.filter(r=>r.status===fs);
  document.getElementById('sTotal').textContent=reqs.length;
  document.getElementById('sPend').textContent=reqs.filter(r=>r.status==='未定').length;
  document.getElementById('sDone').textContent=reqs.filter(r=>r.status==='完了').length;
  const el=document.getElementById('staffContent');
  if(!data.length){el.innerHTML=`<div class="empty"><div class="ei">📋</div><p>該当する依頼がありません</p></div>`;return;}
  el.innerHTML=`<div class="rlist">${data.map(r=>{
    const isMyCase=r.acceptedBy===cu.short;
    const cmts=(r.comments||[]);
    return `<div class="rc s-${sc(r.status)}"><div class="rc-body">
      <div class="rc-top"><span class="rc-co">${r.kaisha}</span><span class="rc-date">${r.date}</span></div>
      <div class="rc-shiji">${r.shiji}</div>
      <div class="rc-kiki">🏭 ${r.kiki}</div>
      ${r.biko?`<div class="rc-biko">📝 ${r.biko}</div>`:''}
      <div class="rc-ft">
        <span class="rc-tanto">👤 ${r.tanto}</span>
        ${r.acceptedBy?`<span class="rc-staff">🛠 ${r.acceptedBy}</span>`:''}
        <select class="ssel ${ssc(r.status)}" onchange="chgSt(${r.id},this)">
          <option value="未定" ${r.status==='未定'?'selected':''}>未定</option>
          <option value="実施中" ${r.status==='実施中'?'selected':''}>実施中</option>
          <option value="完了" ${r.status==='完了'?'selected':''}>完了</option>
        </select>
        <button class="btn-acc ${r.acceptedBy?'done':''}" onclick="accept(${r.id})" ${r.acceptedBy?'disabled':''}>${r.acceptedBy?'✓ 対応中':'引受'}</button>
        ${isMyCase?`<button class="btn-taihi" onclick="openTaihiModal(${r.id})">🔄 引退</button>`:''}
      </div>
      <div class="cmt-area">
        ${cmts.length?`<div class="cmt-list">${cmts.map(c=>`<div class="cmt-item"><div class="cmt-meta"><span>💬 ${c.author}</span><span>${c.date}</span></div><div class="cmt-text">${c.text}</div></div>`).join('')}</div>`:''}
        <div class="cmt-form">
          <textarea id="cmt-${r.id}" placeholder="コメントを入力…"></textarea>
          <button class="btn-cmt" onclick="addComment(${r.id})">投稿</button>
        </div>
      </div>
    </div></div>`;
  }).join('')}</div>`;
}

function chgSt(id,sel){const r=reqs.find(r=>r.id===id);if(!r)return;r.status=sel.value;saveR();renderStaff();showToast(`「${sel.value}」に更新しました`,'ok');}

function accept(id){
  const r=reqs.find(r=>r.id===id);if(!r||r.acceptedBy)return;
  r.acceptedBy=cu.short;if(r.status==='未定')r.status='実施中';saveR();
  emailjs.send(EJ_SVC,EJ_TPL,{shisetsumei:r.kaishaFull||r.kaisha,shiji:`【対応通知】${r.shiji}`,kiki:r.kiki,biko:`${cu.short} が引き受けました`,tanto:r.tanto,date:r.date,to_email:NOTIFY,from_email:"tung16208@gmail.com"}).catch(e=>console.error(e));
  renderStaff();buildNav();showToast(`${r.kaisha} の案件を引き受けました`,'ok');
}

function exportExcel(){
  if(!reqs.length){showToast('データがありません','warn');return;}
  const H=['客先','指示内容','機器','備考','日付','担当者','担当スタッフ','状況'];
  const ws=XLSX.utils.aoa_to_sheet([H,...reqs.map(r=>[r.kaisha,r.shiji,r.kiki,r.biko||'',r.date,r.tanto,r.acceptedBy||'',r.status])]);
  ws['!cols']=[{wch:14},{wch:10},{wch:32},{wch:25},{wch:20},{wch:14},{wch:14},{wch:10}];
  ws['!autofilter']={ref:ws['!ref']};
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'依頼一覧');
  [...new Set(reqs.map(r=>r.kaisha))].forEach(k=>{
    const ws2=XLSX.utils.aoa_to_sheet([H,...reqs.filter(r=>r.kaisha===k).map(r=>[r.kaisha,r.shiji,r.kiki,r.biko||'',r.date,r.tanto,r.acceptedBy||'',r.status])]);
    ws2['!cols']=[{wch:14},{wch:10},{wch:32},{wch:25},{wch:20},{wch:14},{wch:14},{wch:10}];ws2['!autofilter']={ref:ws2['!ref']};
    XLSX.utils.book_append_sheet(wb,ws2,k.substring(0,31));
  });
  const now=new Date();XLSX.writeFile(wb,`依頼管理_${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}.xlsx`);
  showToast('Excelをダウンロードしました','ok');
}

function p2(n){return String(n).padStart(2,'0');}
function sc(s){return s==='未定'?'miteii':s==='実施中'?'jissyu':'kanryo';}
function ssc(s){return s==='未定'?'sm':s==='実施中'?'sj':'sk';}
function bdg(s){return `<span class="bdg b-${s==='未定'?'m':s==='実施中'?'j':'k'}">${s}</span>`;}
function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='show'+(type?' '+type:'');setTimeout(()=>{t.className='';},3500);}

/* ===== 引退モーダル ===== */
let taihiTargetId=null;
function openTaihiModal(id){
  taihiTargetId=id;
  const r=reqs.find(r=>r.id===id);if(!r)return;
  const sel=document.getElementById('taihiSelect');
  const staffList=Object.entries(USERS).filter(([k,v])=>v.type==='staff'&&v.short!==cu.short);
  sel.innerHTML=staffList.map(([k,v])=>`<option value="${v.short}">${v.short}</option>`).join('');
  document.getElementById('taihiModal').style.display='flex';
}
function closeTaihiModal(){document.getElementById('taihiModal').style.display='none';taihiTargetId=null;}
function confirmTaihi(){
  if(!taihiTargetId)return;
  const r=reqs.find(r=>r.id===taihiTargetId);if(!r)return;
  const newStaff=document.getElementById('taihiSelect').value;
  const prev=r.acceptedBy;
  r.acceptedBy=newStaff;
  const now=new Date();
  const ds=`${now.getFullYear()}/${p2(now.getMonth()+1)}/${p2(now.getDate())} ${p2(now.getHours())}:${p2(now.getMinutes())}`;
  if(!r.comments)r.comments=[];
  r.comments.push({author:cu.short,date:ds,text:`🔄 引退: ${prev} → ${newStaff} に引き継ぎました`});
  saveR();closeTaihiModal();renderStaff();
  showToast(`${newStaff} に引き継ぎました`,'ok');
}

/* ===== コメント ===== */
function addComment(id){
  const ta=document.getElementById(`cmt-${id}`);if(!ta)return;
  const text=ta.value.trim();if(!text){showToast('コメントを入力してください','error');return;}
  const r=reqs.find(r=>r.id===id);if(!r)return;
  if(!r.comments)r.comments=[];
  const now=new Date();
  const ds=`${now.getFullYear()}/${p2(now.getMonth()+1)}/${p2(now.getDate())} ${p2(now.getHours())}:${p2(now.getMinutes())}`;
  r.comments.push({author:cu.short,date:ds,text});
  saveR();renderStaff();showToast('コメントを保存しました','ok');
